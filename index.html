<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Kupon Souvenir | Hanis & Diyana</title>
    <!-- Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts untuk tipografi -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Background krem kecoklatan senada dengan gambar baru */
            background-color: #f5f0e6; 
            background-image: radial-gradient(#d4c4b7 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Animasi masuk */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Efek bayangan untuk gambar agar terlihat seperti melayang */
        .img-shadow {
            box-shadow: 0 15px 35px -5px rgba(92, 70, 50, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

    <!-- Container Utama -->
    <div class="bg-[#faf8f5] max-w-lg w-full rounded-2xl shadow-xl p-6 sm:p-8 text-center relative overflow-hidden fade-in-up border border-[#e8dfd1]">
        
        <!-- Garis Aksen di Atas (Warna Coklat Tua / Emas Kusam) -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-[#5c4632] via-[#a3875e] to-[#5c4632]"></div>

        <!-- Bagian Header -->
        <div class="mt-2 mb-8">
            <h2 class="font-serif italic text-[#8c7457] text-lg sm:text-xl mb-1 tracking-wide">The Wedding of</h2>
            <h1 class="font-serif text-3xl sm:text-4xl font-bold text-[#4a3b2c] mb-2 mt-2">Hanis & Diyana</h1>
            <div class="flex items-center justify-center gap-4 mt-4">
                <div class="h-px bg-[#d4c4b7] w-12"></div>
                <p class="text-[#7a644c] font-semibold tracking-widest text-sm uppercase">28 Juni 2026</p>
                <div class="h-px bg-[#d4c4b7] w-12"></div>
            </div>
        </div>

        <!-- Bagian Gambar Voucher -->
        <!-- Menyesuaikan ukuran agar gambar baru terlihat utuh dan elegan -->
        <div class="relative rounded-xl mb-8 img-shadow">
                <!-- 
                  Sumber gambar diubah menjadi suvenir.png
                -->
                <img src="suvenir.png" 
                     alt="Voucher Penukaran Souvenir" 
                     class="w-full h-auto rounded-lg object-contain"
                     onerror="this.src='https://via.placeholder.com/800x450?text=Gambar+Voucher+(suvenir.png)+Akan+Tampil+Di+Sini'">
        </div>

        <!-- Bagian Footer / Penutup -->
        <div class="mt-6 mb-2">
            <p class="font-serif text-2xl sm:text-3xl text-[#4a3b2c] italic font-medium">Terima Kasih</p>
            <p class="text-xs text-[#8c7457] mt-3 font-medium uppercase tracking-widest">Tunjukkan layar ini kepada petugas suvenir</p>
        </div>
        
    </div>

</body>
</html>
